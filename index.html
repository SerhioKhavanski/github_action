<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/github_action/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>github-actions</title>

    <link rel="stylesheet" crossorigin href="/github_action/assets/index-DK2nLjgJ.css">
  </head>
  <body>

    <section class="container">

      <div class="formContainer sign-in">

         <form action="" class="form">
                <h2>Sign In</h2>
                <div class="form__links">

                  <a href="#">
                    <div class="form__link">
                      <svg>
                        <use href="./sprite.svg#google"></use>
                      </svg>
                    </div>
                    </a>
                    <a href="#">
                      <div class="form__link">
                        <svg>
                          <use href="./sprite.svg#facebook"></use>
                        </svg>
                      </div>
                    </a>
                    <a href="#">
                      <div class="form__link">
                        <svg>
                          <use href="./sprite.svg#github"></use>
                        </svg>
                      </div>
                    </a>
                    <a href="#">
                      <div class="form__link">
                        <svg>
                          <use href="./sprite.svg#linkedIn"></use>
                        </svg>
                      </div>
                    </a>
                </div>
                <input class="input" type="email" id="email-sign-in" placeholder="Email">
                <input class="input" type="password" id="password-sign-in" placeholder="Password">
                <a href="#">Forget Your Password?</a>
                <button class="btn" type="submit" id="enter-sign-in">SIGN IN</button>
          </form>
      </div>
       
      <div class="formContainer sign-up">
        <form action="" class="form">
            <h2>Sign up</h2>
            <div class="form__links">

              <a href="#">
                <div class="form__link">
                  <svg>
                    <use href="./sprite.svg#google"></use>
                  </svg>
                </div>
                </a>
                <a href="#">
                  <div class="form__link">
                    <svg>
                      <use href="./sprite.svg#facebook"></use>
                    </svg>
                  </div>
                </a>
                <a href="#">
                  <div class="form__link">
                    <svg>
                      <use href="./sprite.svg#github"></use>
                    </svg>
                  </div>
                </a>
                <a href="#">
                  <div class="form__link">
                    <svg>
                      <use href="./sprite.svg#linkedIn"></use>
                    </svg>
                  </div>
                </a>
            </div>
            <input class="input" type="text" id="name-sign-up" placeholder="Name">
            <input class="input" type="email" id="email-sign-up" placeholder="Email">
            <input class="input" type="password" id="password-sign-up" placeholder="Password">
            <button class="btn" type="submit" id="enter">SIGN UP</button>
        </form>
      </div>  

      <div class="overlay-mask">
        <div class="overlay">
            <div class="overlay__greetings">
              <h2>Welcome Back</h2>
              <p>Enter your personal details to use all of site features</p>
              <button class="btn secondary" type="button" id="signIn">SIGN IN</button>
            </div>

            <div class="overlay__register">
              <h2>Hello, Friend!</h2>
              <p>Register with your personal details to use all of site features</p>
              <button class="btn secondary" type="button" id="signUp">SIGN UP</button>
            </div>
        </div>
      </div>
    </section>
